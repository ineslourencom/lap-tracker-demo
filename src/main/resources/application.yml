
spring:
  application:
    name: lap-tracker-service

  datasource:
    url: jdbc:postgresql://localhost:5432/lap_tracker
    username: ${DB_USERNAME:lap_tracker_user}
    password: ${DB_PASSWORD:lap_tracker_pass}
    driver-class-name: org.postgresql.Driver
    
    # HikariCP Connection Pool Settings
    hikari:
      pool-name: LapTrackerHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000          # 5 minutes
      max-lifetime: 1200000         # 20 minutes
      connection-timeout: 20000     # 20 seconds
      leak-detection-threshold: 60000  # 1 minute (for debugging)
      
      # PostgreSQL-specific optimizations
      data-source-properties:
        reWriteBatchedInserts: true   # CRITICAL: Enables PostgreSQL batch rewriting
        prepareThreshold: 5           # Number of executions before preparing
        preparedStatementCacheQueries: 256
        preparedStatementCacheSizeMiB: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: true 
    
    properties:
      hibernate:
        jdbc:
          batch_size: 50                    # Match SEQUENCE allocationSize
          batch_versioned_data: true        # Batch versioned entities
          fetch_size: 100                   # JDBC fetch size for queries
          
        # Order statements to maximize batching effectiveness
        order_inserts: true                 # Group INSERTs by entity type
        order_updates: true                 # Group UPDATEs by entity type
        
        # ---------------------------------------------------------------
        # Prevent N+1 and improve query performance
        # ---------------------------------------------------------------
        default_batch_fetch_size: 50        # Batch fetch lazy collections
        
        # ---------------------------------------------------------------
        # Connection handling
        # ---------------------------------------------------------------
        connection:
          provider_disables_autocommit: true  # Let Hikari manage autocommit
          
        # ---------------------------------------------------------------
        # Statistics (enable for debugging, disable in production)
        # ---------------------------------------------------------------
        generate_statistics: false
        
        # ---------------------------------------------------------------
        # Logging (adjust per environment)
        # ---------------------------------------------------------------
        format_sql: false
        use_sql_comments: false

  # ---------------------------------------------------------------------
  # Flyway Database Migrations
  # ---------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: '0'

# =====================================================================
# Logging Configuration
# =====================================================================
logging:
  level:
    root: INFO
    com.laptracker: INFO
    
    # Enable for debugging batch inserts (disable in production)
    # org.hibernate.SQL: DEBUG
    # org.hibernate.type.descriptor.sql: TRACE
    # org.hibernate.engine.jdbc.batch: DEBUG
    
    # Connection pool monitoring
    com.zaxxer.hikari: INFO
    
    # Spring Data JPA
    org.springframework.data.jpa: INFO

# Observation tools setup
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.90, 0.95, 0.99

server:
  port: 8080
  shutdown: graceful
  
  # Enable response compression
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024

---
# =====================================================================
# Development Profile
# =====================================================================
spring:
  config:
    activate:
      on-profile: dev
      
  datasource:
    url: jdbc:postgresql://localhost:5432/lap_tracker_dev
    hikari:
      maximum-pool-size: 5
      
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        generate_statistics: true
        format_sql: true
        use_sql_comments: true

logging:
  level:
    com.laptracker: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    # Shows batch insert execution
    org.hibernate.engine.jdbc.batch: DEBUG

---
# =====================================================================
# Production Profile
# =====================================================================
spring:
  config:
    activate:
      on-profile: prod
      
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      
  jpa:
    properties:
      hibernate:
        generate_statistics: false
        format_sql: false

logging:
  level:
    root: WARN
    com.laptracker: INFO
    org.hibernate: WARN
